<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Chemie Escape Room</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Load CanvasKit (Skia WASM) synchronously BEFORE the main bundle.
         The main bundle's Skia.web.js reads global.CanvasKit at module-eval time,
         so CanvasKit must be fully initialised first. -->
    <script src="/canvaskit.js"></script>
    <script>
      // CanvasKitInit is now defined by canvaskit.js above.
      // We block the main bundle with a tiny loader script.
      window.__skiaReady = CanvasKitInit({
        locateFile: (f) => '/_expo/static/js/web/' + f,
      }).then((ck) => { window.CanvasKit = ck; });
    </script>
    <script>
      // Defer the main bundle until Skia WASM resolves.
      window.__skiaReady.then(() => {
        const s = document.createElement('script');
        s.src = '/_expo/static/js/web/index-2a229ee17b59f16fc143941d37986af1.js';
        document.body.appendChild(s);
      });
    </script>
  </body>
</html>
